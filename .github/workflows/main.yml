name: Chat Service CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test / READY Evidence
    runs-on: ubuntu-latest
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    outputs:
      ready_eligible: ${{ steps.evidence.outputs.ready_eligible }}
      classification: ${{ steps.evidence.outputs.classification }}
      checkout_sha: ${{ steps.sha.outputs.checkout_sha }}
    steps:
      - name: Checkout PR SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Assert checked out SHA
        id: sha
        run: |
          actual_sha="$(git rev-parse HEAD)"
          echo "checkout_sha=${actual_sha}" >> "$GITHUB_OUTPUT"
          if [ "$actual_sha" != "$EXPECTED_SHA" ]; then
            echo "Expected $EXPECTED_SHA but checked out $actual_sha" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build / Typecheck
        run: npm run build

      - name: Run Tests
        run: |
          set -o pipefail
          npm run test:ci | tee test-output.tap

      - name: Generate READY Evidence
        id: evidence
        env:
          CHECKOUT_SHA: ${{ steps.sha.outputs.checkout_sha }}
          REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-ready-evidence.js

      - name: Upload READY Evidence
        uses: actions/upload-artifact@v4
        with:
          name: ready-evidence
          path: ready-evidence.json

  Build:
    name: Docker Build / Publish
    needs: test
    if: ${{ github.event_name != 'pull_request' && needs.test.outputs.ready_eligible == 'true' }}
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: dcfhermes
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set outputs
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "branch=$(echo ${GITHUB_HEAD_REF:-$GITHUB_REF_NAME} | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Docker Build
        run: |
          docker build . --build-arg VERSION=${{ steps.vars.outputs.sha_short }} --file Dockerfile --tag dcfhermes/dcf-chat-svc:${{ steps.vars.outputs.sha_short }}
          docker tag dcfhermes/dcf-chat-svc:${{ steps.vars.outputs.sha_short }} dcfhermes/dcf-chat-svc:${{ steps.vars.outputs.branch }}
          docker push dcfhermes/dcf-chat-svc:${{ steps.vars.outputs.sha_short }}
          docker push dcfhermes/dcf-chat-svc:${{ steps.vars.outputs.branch }}

      - name: Notify discord
        uses: th0th/notify-discord@v0.4.1
        if: ${{ always() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_JOB_NAME: 'Chat Service Docker Container Build/Publish - ${{ env.BRANCH_NAME }}'
          GITHUB_JOB_STATUS: ${{ job.status }}
